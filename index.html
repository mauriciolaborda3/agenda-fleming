<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Agenda Fleming">
<meta name="theme-color" content="#1a1a6e">
<title>Agenda Fleming</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#F4F6FB;color:#1A1A2E;min-height:100vh;padding-bottom:80px;}
.hdr{background:linear-gradient(135deg,#0d0d4a,#1a1a6e);padding:14px 16px 50px;position:relative;overflow:hidden;}
.hdr::after{content:"";position:absolute;bottom:-28px;left:0;right:0;height:56px;background:#F4F6FB;border-radius:50% 50% 0 0;}
.hdr-in{display:flex;align-items:center;gap:12px;position:relative;z-index:1;}
.logo{width:50px;height:50px;border-radius:50%;border:2px solid #E8943A;}
.hdr h1{color:#fff;font-family:Nunito,sans-serif;font-size:18px;font-weight:900;}
.hdr p{color:#E8943A;font-size:12px;margin-top:2px;}
.ctabs{display:flex;gap:8px;padding:0 14px;margin-top:-20px;position:relative;z-index:10;margin-bottom:12px;}
.ct{flex:1;background:#fff;border:2px solid #E4E8F0;border-radius:14px;padding:9px 4px;text-align:center;cursor:pointer;}
.ctn{font-family:Nunito,sans-serif;font-size:13px;font-weight:800;display:block;}
.ctg{font-size:11px;color:#7A8499;display:block;margin-top:1px;}
.ct.a0{background:#EBF4FF;border-color:#4A90D9;}
.ct.a0 .ctn{color:#1E5FA8;}
.ct.a1{background:#E6FAF4;border-color:#2ECC9A;}
.ct.a1 .ctn{color:#0F8C68;}
.ct.a2{background:#FEF6E6;border-color:#F5A623;}
.ct.a2 .ctn{color:#B87200;}
.nav{display:flex;background:#fff;border-radius:14px;margin:0 14px 12px;padding:4px;gap:2px;}
.nb{flex:1;padding:7px 2px;border:none;background:none;border-radius:10px;font-size:10px;font-weight:700;color:#7A8499;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:Arial,sans-serif;}
.ni{font-size:16px;}
.nb.act{background:#1a1a6e;color:#fff;}
.con{padding:0 14px;}
.card{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;}
.ct2{font-family:Nunito,sans-serif;font-size:14px;font-weight:800;margin-bottom:10px;}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.sh h2{font-family:Nunito,sans-serif;font-size:16px;font-weight:800;}
input,select{width:100%;padding:9px 11px;border:1.5px solid #E4E8F0;border-radius:10px;font-size:14px;color:#1A1A2E;background:#fff;outline:none;margin-bottom:9px;font-family:Arial,sans-serif;}
label{font-size:11px;font-weight:700;color:#7A8499;display:block;margin-bottom:3px;text-transform:uppercase;}
.btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;font-family:Nunito,sans-serif;}
.bp{background:#1a1a6e;color:#fff;}
.bg2{background:#E8943A;color:#fff;}
.bs{font-size:12px;padding:7px 11px;border-radius:8px;border:1.5px solid #E4E8F0;background:#fff;font-weight:700;cursor:pointer;}
.bd{background:#FDEDEC;color:#E74C3C;border:none;border-radius:8px;padding:5px 9px;font-size:12px;font-weight:700;cursor:pointer;}
.mr{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #E4E8F0;}
.mr:last-child{border-bottom:none;}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.mn{font-size:13px;font-weight:700;}
.ms{font-size:12px;color:#7A8499;margin-top:2px;}
.ms b{color:#1A1A2E;}
.blq{display:flex;align-items:center;gap:8px;background:#F8F9FD;border-radius:10px;padding:8px 10px;margin-bottom:6px;}
.bh{font-size:12px;font-weight:800;color:#7A8499;min-width:42px;}
.bm{font-size:13px;font-weight:700;flex:1;}
.bdur{font-size:11px;color:#7A8499;}
.pc{background:#fff;border-radius:14px;padding:12px;margin-bottom:10px;border-left:4px solid #E4E8F0;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.pc.urg{border-left-color:#E74C3C;}
.pc.soon{border-left-color:#F5A623;}
.pt{font-size:14px;font-weight:800;margin:4px 0;font-family:Nunito,sans-serif;}
.ps{font-size:12px;color:#7A8499;}
.exc{background:#fff;border-radius:14px;padding:12px;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.eic{width:38px;height:38px;border-radius:10px;background:#F0F2F7;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.en{font-size:14px;font-weight:800;font-family:Nunito,sans-serif;}
.es{font-size:12px;color:#7A8499;margin-top:2px;}
.rc{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;}
.sr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #E4E8F0;font-size:13px;}
.sr:last-child{border-bottom:none;}
.sl{color:#7A8499;}
.sv{font-weight:800;font-size:14px;font-family:Nunito,sans-serif;}
.ab{background:#FDEDEC;border-radius:14px;padding:12px;margin-bottom:12px;border:1.5px solid #FADBD8;}
.ab h3{font-size:13px;font-weight:800;color:#E74C3C;margin-bottom:8px;font-family:Nunito,sans-serif;}
.ai{font-size:12px;padding:4px 0;border-bottom:1px solid #FADBD8;display:flex;justify-content:space-between;gap:8px;}
.ai:last-child{border-bottom:none;}
.mail{display:inline-flex;align-items:center;gap:4px;background:#EEF2FF;border-radius:8px;padding:3px 8px;font-size:11px;color:#3730A3;font-weight:600;margin-top:4px;}
.af{background:#F8F9FD;border-radius:10px;padding:11px;margin-top:6px;display:none;}
.af.op{display:block;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ds{margin-bottom:14px;}
.dn{font-size:14px;font-weight:800;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;font-family:Nunito,sans-serif;}
.pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;}
.pn{background:#EEEEF8;color:#1a1a6e;}
.pr{background:#FDEDEC;color:#E74C3C;}
.pa{background:#FEF6E6;color:#B87200;}
.empty{text-align:center;padding:32px 16px;color:#7A8499;font-size:14px;}
.emico{font-size:40px;display:block;margin-bottom:8px;}
</style>
</head>

<script>
var DOTS=["#4A90D9","#2ECC9A","#F5A623","#E74C3C","#8E44AD","#1ABC9C","#E67E22","#2C3E50","#16A085","#D35400","#7F8C8D"];
var DIAS=["lunes","martes","miercoles","jueves","viernes"];
var DLab=["Lunes","Martes","Miercoles","Jueves","Viernes"];
var TIPOS={"Futbol":"&#9917;","Basketball":"&#127936;","Tenis":"&#127934;","Natacion":"&#127946;","Danza":"&#128131;","Ballet":"&#129392;","Arte":"&#127912;","Musica":"&#127925;","Ingles":"&#127468;&#127463;","Teatro":"&#127917;","Karate":"&#129355;","Computacion":"&#128187;","Otro":"&#11088;"};
var MB=[
  ["Lenguaje","Matematicas","Ciencias Naturales","Historia","Ingles","Musica","Ed. Fisica","Religion","Orientacion","Arte"],
  ["Lenguaje","Matematicas","Ciencias Naturales","Historia","Ingles","Tecnologia","Ed. Fisica","Religion","Orientacion","Ciencias Literarias"],
  ["Lenguaje","Matematicas","Ciencias Naturales","Historia","Ingles","Tecnologia","Ed. Fisica","Arte","Orientacion","Ciencias Literarias"]
];
var CC=[{b:"#4A90D9"},{b:"#2ECC9A"},{b:"#F5A623"}];

function mkMats(i){var r=[];for(var j=0;j<MB[i].length;j++)r.push({n:MB[i][j],s1:"",s2:""});return r;}
function mkHor(){return {lunes:[],martes:[],miercoles:[],jueves:[],viernes:[]};}

function defState(){
  return {ci:0,ti:0,of:{},ch:[
    {name:"Amanda",grade:"2A",correo:null,mats:mkMats(0),pruebas:[],hor:mkHor(),extra:[]},
    {name:"Rafaella",grade:"4A",correo:"rafaella.laborda@colegiofleming.cl",mats:mkMats(1),pruebas:[],hor:mkHor(),extra:[]},
    {name:"Leon",grade:"5A",correo:"leon.laborda@colegiofleming.cl",mats:mkMats(2),pruebas:[],hor:mkHor(),extra:[]}
  ]};
}

function loadS(){try{var s=localStorage.getItem("flem5");if(s){var p=JSON.parse(s);if(p&&p.ch&&p.ch.length===3)return p;}}catch(e){}return defState();}
function saveS(){try{localStorage.setItem("flem5",JSON.stringify(ST));}catch(e){}}

var ST=loadS();
var EM=-1;
var curC=function(){return ST.ch[ST.ci];};

function setChild(i){
  ST.ci=i;saveS();
  for(var x=0;x<3;x++){var t=document.getElementById("tab"+x);if(t){t.className="ct"+(x===i?" a"+i:"");}}
  renderMain();
}

function setTab(i){
  ST.ti=i;saveS();
  for(var x=0;x<5;x++){var b=document.getElementById("nb"+x);if(b)b.className="nb"+(x===i?" act":"");}
  renderMain();
}

function renderMain(){
  var el=document.getElementById("main");
  if(!el)return;
  var t=ST.ti;
  if(t===0)el.innerHTML=rHome();
  else if(t===1)el.innerHTML=rMats();
  else if(t===2)el.innerHTML=rHor();
  else if(t===3)el.innerHTML=rPruebas();
  else el.innerHTML=rExtra();
}

function fmt(f){try{return new Date(f+"T00:00:00").toLocaleDateString("es-CL",{day:"numeric",month:"short",weekday:"short"});}catch(e){return f;}}

function rHome(){
  var hoy=new Date();
  var al=[];
  for(var i=0;i<ST.ch.length;i++){
    var c=ST.ch[i];
    for(var j=0;j<c.pruebas.length;j++){
      var p=c.pruebas[j];
      var d=new Date(p.f+"T00:00:00");
      if(d>=hoy&&d<=new Date(hoy.getTime()+7*86400000))al.push({t:p.t,mat:p.m,f:p.f,cn:c.name,col:CC[i].b});
    }
  }
  al.sort(function(a,b){return new Date(a.f)-new Date(b.f);});
  var h="";
  if(al.length){h+='<div class="ab"><h3>Proximos 7 dias</h3>';for(var i=0;i<al.length;i++)h+='<div class="ai"><span><b>'+al[i].cn+'</b> - '+al[i].mat+': '+al[i].t+'</span><span>'+fmt(al[i].f)+'</span></div>';h+='</div>';}
  for(var i=0;i<ST.ch.length;i++){
    var c=ST.ch[i];var col=CC[i].b;
    var px=[];for(var j=0;j<c.pruebas.length;j++)if(new Date(c.pruebas[j].f+"T00:00:00")>=hoy)px.push(c.pruebas[j]);
    px.sort(function(a,b){return new Date(a.f)-new Date(b.f);});
    var prx=px[0];
    var cor=c.correo?'<div class="mail">&#9993; '+c.correo+'</div>':"";
    h+='<div class="rc" style="border-left:4px solid '+col+'"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><div style="width:38px;height:38px;border-radius:50%;background:'+col+';display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:#fff">'+c.grade+'</div><div style="flex:1"><div style="font-size:16px;font-weight:900;font-family:Nunito,sans-serif">'+c.name+'</div><div style="font-size:12px;color:#7A8499">'+c.mats.length+' materias - '+c.extra.length+' extra</div>'+cor+'</div></div>';
    h+='<div class="sr"><span class="sl">Proxima prueba</span><span class="sv" style="color:'+col+'">'+(prx?prx.m+" "+fmt(prx.f):"Sin pruebas")+'</span></div>';
    h+='<div class="sr"><span class="sl">Pruebas</span><span class="sv">'+c.pruebas.length+'</span></div>';
    h+='<div class="sr"><span class="sl">Extraescolares</span><span class="sv">'+c.extra.length+'</span></div></div>';
  }
  return h;
}

function rMats(){
  var c=curC();
  var rows="";
  for(var i=0;i<c.mats.length;i++){var m=c.mats[i];rows+='<div class="mr"><div class="dot" style="background:'+DOTS[i%11]+'"></div><div style="flex:1"><div class="mn">'+m.n+'</div><div class="ms">S1: <b>'+(m.s1||"sin contenido")+'</b> - S2: <b>'+(m.s2||"sin contenido")+'</b></div><button class="bs" style="margin-top:6px" onclick="editM('+i+')">Editar</button></div></div>';}
  return '<div class="sh"><h2>'+c.name+'</h2><button class="bs" onclick="showAM()">+ Nueva</button></div>'
    +'<div class="card" id="amf" style="display:none"><div class="ct2">Nueva materia</div>'
    +'<label>Nombre</label><input type="text" id="nm-n" placeholder="Ej: Ciencias Literarias">'
    +'<label>Semestre 1</label><input type="text" id="nm-s1" placeholder="Contenidos sem 1">'
    +'<label>Semestre 2</label><input type="text" id="nm-s2" placeholder="Contenidos sem 2">'
    +'<button class="btn bp" onclick="saveNM()">Guardar</button></div>'
    +'<div class="card" id="emf" style="display:none"><div class="ct2">Editar contenidos</div>'
    +'<label>Semestre 1</label><input type="text" id="em-s1">'
    +'<label>Semestre 2</label><input type="text" id="em-s2">'
    +'<div class="fr" style="margin-top:4px"><button class="btn bp" onclick="saveEM()">Guardar</button>'
    +'<button class="btn" style="background:#F0F2F7" onclick="cancelE()">Cancelar</button></div></div>'
    +'<div class="card">'+rows+'</div>';
}
function showAM(){var f=document.getElementById("amf");if(f)f.style.display=f.style.display==="none"?"block":"none";}
function saveNM(){var n=document.getElementById("nm-n");if(!n||!n.value.trim()){alert("Escribe el nombre");return;}curC().mats.push({n:n.value.trim(),s1:document.getElementById("nm-s1").value,s2:document.getElementById("nm-s2").value});saveS();renderMain();}
function editM(i){EM=i;var m=curC().mats[i];document.getElementById("emf").style.display="block";document.getElementById("em-s1").value=m.s1;document.getElementById("em-s2").value=m.s2;}
function saveEM(){if(EM<0)return;curC().mats[EM].s1=document.getElementById("em-s1").value;curC().mats[EM].s2=document.getElementById("em-s2").value;EM=-1;saveS();renderMain();}
function cancelE(){EM=-1;renderMain();}

function rHor(){
  var c=curC();if(!ST.of)ST.of={};
  var mo="";for(var i=0;i<c.mats.length;i++)mo+="<option>"+c.mats[i].n+"</option>";
  mo+="<option>Recreo</option><option>Almuerzo</option><option>Lectura</option><option>Tareas</option>";
  var h='<div class="sh"><h2>Horario - '+c.name+'</h2></div><div class="card">';
  for(var di=0;di<DIAS.length;di++){
    var d=DIAS[di];var bls=c.hor[d]||[];var bl="";
    for(var bi=0;bi<bls.length;bi++){var b=bls[bi];bl+='<div class="blq"><span class="bh">'+b.h+'</span><div style="flex:1"><span class="bm">'+b.m+'</span><br><span class="bdur">'+b.d+' min</span></div><button class="bd" onclick="delBl(''+d+'','+bi+')">X</button></div>';}
    var fid="hf-"+d;var io=ST.of[fid];
    h+='<div class="ds"><div class="dn">'+DLab[di]+'<button class="bs" onclick="togHF(''+fid+'')">'+(io?"Cerrar":"Agregar")+'</button></div>';
    h+=bl||'<div style="font-size:12px;color:#7A8499;padding:4px 0">Sin bloques</div>';
    h+='<div class="af'+(io?" op":"")+'" id="'+fid+'">';
    h+='<label>Materia</label><select id="sm-'+d+'">'+mo+'</select>';
    h+='<div class="fr"><div><label>Hora</label><input type="time" id="sh-'+d+'" value="08:00"></div>';
    h+='<div><label>Minutos</label><input type="number" id="sd-'+d+'" value="45" min="5" max="180"></div></div>';
    h+='<button class="btn bp" onclick="saveBl(''+d+'')">Guardar</button></div></div>';
  }
  h+='</div>';return h;
}
function togHF(fid){if(!ST.of)ST.of={};ST.of[fid]=!ST.of[fid];renderMain();}
function saveBl(d){
  var mat=document.getElementById("sm-"+d);var hora=document.getElementById("sh-"+d);var dur=document.getElementById("sd-"+d);
  if(!mat||!hora||!mat.value||!hora.value){alert("Completa los datos");return;}
  var c=curC();if(!c.hor[d])c.hor[d]=[];
  c.hor[d].push({h:hora.value,d:parseInt(dur?dur.value:45)||45,m:mat.value});
  ST.of["hf-"+d]=false;saveS();renderMain();
}
function delBl(d,bi){curC().hor[d].splice(bi,1);saveS();renderMain();}

function rPruebas(){
  var c=curC();var hoy=new Date();
  var sorted=c.pruebas.slice().sort(function(a,b){return new Date(a.f)-new Date(b.f);});
  var px=[],pa=[];
  for(var i=0;i<sorted.length;i++){if(new Date(sorted[i].f+"T00:00:00")>=hoy)px.push(sorted[i]);else pa.push(sorted[i]);}
  var mo="";for(var i=0;i<c.mats.length;i++)mo+="<option>"+c.mats[i].n+"</option>";
  var h='<div class="sh"><h2>Pruebas - '+c.name+'</h2></div>'
    +'<div class="card"><div class="ct2">Nueva prueba</div>'
    +'<label>Materia</label><select id="np-mat">'+mo+'</select>'
    +'<label>Fecha</label><input type="date" id="np-f">'
    +'<label>Nombre</label><input type="text" id="np-t" placeholder="Ej: Prueba de multiplicacion">'
    +'<label>Contenido a estudiar</label><input type="text" id="np-c" placeholder="Ej: Tablas del 6 al 9">'
    +'<button class="btn bp" onclick="addP()">Agregar prueba</button></div>';
  function card(p){
    var d=new Date(p.f+"T00:00:00");var ds=Math.ceil((d-hoy)/86400000);
    var ug=ds>=0&&ds<=1,pr=ds>=0&&ds<=5;
    var badge=ug?'<span class="pill pr">'+(ds===0?"Hoy":"Manana")+"</span>":pr?'<span class="pill pa">'+ds+" dias</span>":"";
    var idx=c.pruebas.indexOf(p);
    return '<div class="pc'+(ug?" urg":pr?" soon":"")+'"><div style="flex:1"><div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px"><span class="pill pn">'+p.m+"</span>"+badge+'</div><div class="pt">'+p.t+'</div><div class="ps">'+fmt(p.f)+(p.c?" - "+p.c:"")+"</div></div>"
      +'<button class="bd" onclick="delP('+idx+')">Borrar</button></div>';
  }
  if(px.length){h+='<div class="ct2" style="margin:12px 0 8px">Proximas ('+px.length+")</div>";for(var i=0;i<px.length;i++)h+=card(px[i]);}
  if(pa.length){h+='<div class="ct2" style="margin:12px 0 8px;color:#7A8499">Pasadas</div>';for(var i=0;i<pa.length;i++)h+=card(pa[i]);}
  if(!px.length&&!pa.length)h+='<div class="empty"><span class="emico">&#128197;</span>Sin pruebas registradas</div>';
  return h;
}
function addP(){
  var mat=document.getElementById("np-mat");var f=document.getElementById("np-f");
  var t=document.getElementById("np-t");var c=document.getElementById("np-c");
  if(!f||!f.value){alert("Selecciona la fecha");return;}
  if(!t||!t.value.trim()){alert("Escribe el nombre de la prueba");return;}
  curC().pruebas.push({m:mat?mat.value:"",f:f.value,t:t.value.trim(),c:c?c.value.trim():""});
  saveS();renderMain();
}
function delP(i){if(!confirm("Eliminar esta prueba?"))return;curC().pruebas.splice(i,1);saveS();renderMain();}

function rExtra(){
  var c=curC();
  var to="";for(var k in TIPOS)to+="<option>"+k+"</option>";
  var dop="";for(var i=0;i<DLab.length;i++)dop+="<option>"+DLab[i]+"</option>";
  var h='<div class="sh"><h2>Extraescolares - '+c.name+'</h2></div>'
    +'<div class="card"><div class="ct2">Nueva actividad</div>'
    +'<label>Tipo</label><select id="ex-t">'+to+"</select>"
    +'<label>Nombre</label><input type="text" id="ex-n" placeholder="Ej: Futbol Fleming">'
    +'<div class="fr"><div><label>Dia</label><select id="ex-d">'+dop+"</select></div>"
    +'<div><label>Hora</label><input type="time" id="ex-h" value="16:00"></div></div>'
    +'<label>Lugar (opcional)</label><input type="text" id="ex-l" placeholder="Ej: Gimnasio">'
    +'<label>Profesor (opcional)</label><input type="text" id="ex-p" placeholder="Ej: Profe Martinez">'
    +'<button class="btn bg2" onclick="addEx()">Agregar actividad</button></div>';
  if(c.extra.length===0)return h+'<div class="empty"><span class="emico">&#11088;</span>Sin actividades</div>';
  for(var i=0;i<c.extra.length;i++){
    var e=c.extra[i];var ico=TIPOS[e.tipo]||"&#11088;";
    h+='<div class="exc"><div class="eic">'+ico+'</div><div style="flex:1"><div class="en">'+e.n+'</div><div class="es">'+e.dia+" "+e.hora+(e.lugar?" - "+e.lugar:"")+(e.prof?" - Prof. "+e.prof:"")+'</div></div><button class="bd" onclick="delEx('+i+')">Borrar</button></div>';
  }
  return h;
}
function addEx(){
  var tp=document.getElementById("ex-t");var n=document.getElementById("ex-n");
  var d=document.getElementById("ex-d");var h=document.getElementById("ex-h");
  var l=document.getElementById("ex-l");var p=document.getElementById("ex-p");
  if(!n||!n.value.trim()){alert("Escribe el nombre");return;}
  curC().extra.push({tipo:tp?tp.value:"Otro",n:n.value.trim(),dia:d?d.value:"Lunes",hora:h?h.value:"16:00",lugar:l?l.value.trim():"",prof:p?p.value.trim():""});
  saveS();renderMain();
}
function delEx(i){if(!confirm("Eliminar?"))return;curC().extra.splice(i,1);saveS();renderMain();}

window.onload=function(){setChild(ST.ci||0);setTab(ST.ti||0);};
</script></body></html>
